name: Render & Deploy Quarto Site

on:
  push:
    branches: [main]
    paths:
      - '**.qmd'
      - '**.ipynb'
      - '_quarto.yml'
      - 'custom-theme.css'
      - 'assets/**'
      - 'background_photos/**'
      - 'math/assets/**'
      - 'math/Homeworks/**'
      - 'math/Lectures/**'
      - 'python/assets/**'
      - '.github/workflows/publish.yml'
  workflow_dispatch:  # manual trigger still available

# Only allow one deployment at a time
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render site
        uses: quarto-dev/quarto-actions/render@v2

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: render
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
